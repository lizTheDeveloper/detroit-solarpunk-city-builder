name: CI

# CI runs build + tests only. Deployment is NOT done via GitHub Actions — it
# uses the studio's standard game-deploy pattern: a git checkout at
# /opt/solarpunk-detroit on the Hetzner box, deployed with deploy/deploy.sh
# (cf. /opt/precursors). See ops/deploy-solarpunk-detroit.md.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npx vitest run
